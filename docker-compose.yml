version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./index:/app/index
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "3000:3000"
    command: npm run dev -- --host
    depends_on:
      - backend
